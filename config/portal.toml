dynaconf_merge = true

[portal]
# The class to use for the portal application. Generally no reason to change this.
class = "muforge.portal:Application"

# The Portal will attempt to connect to the Game's webserver using this URL.
# It should match the URL that the Game's webserver is bound to.
# It's perfectly okay to use localhost or 127.0.0.1 here if
# the game's running on the same machine as the portal.

[portal.httpx]
# Config for the HTTPX client used by Portal Connections.
# Probably no need to change this.
base_url = "https://127.0.0.1:8000"
http2 = true
limits = {max_connections = 10, max_keepalive_connections = 10}
verify = false
follow_redirects = true
